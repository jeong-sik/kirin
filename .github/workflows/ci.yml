name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  # Mitigate transient opam download failures (e.g. occasional 5xx from upstream).
  OPAMRETRIES: 5

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        ocaml-compiler: ['5.1', '5.2']

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up OCaml ${{ matrix.ocaml-compiler }}
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: ${{ matrix.ocaml-compiler }}

    - name: Pin internal opam deps (not published on opam-repository)
      run: |
        opam pin add -n -y mcp_protocol https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y mcp_protocol_eio https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y mcp_protocol_http https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y grpc-direct https://github.com/jeong-sik/grpc-direct.git#main
        opam pin add -n -y grpc-direct-core https://github.com/jeong-sik/grpc-direct.git#main
        opam pin add -n -y ocaml-webrtc https://github.com/jeong-sik/ocaml-webrtc.git#main

    - name: Install dependencies
      run: |
        opam install . --deps-only --with-test --with-doc -y

    - name: Build
      run: opam exec -- dune build -p kirin @install

    - name: Run tests
      run: opam exec -- dune runtest -p kirin

    - name: Build documentation
      run: opam exec -- dune build -p kirin @doc
      continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: '5.2'

    - name: Lint opam file
      run: opam lint kirin.opam

  coverage:
    runs-on: ubuntu-latest
    needs: build
    # Run coverage on main pushes and PRs to track trends.
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: '5.2'

    - name: Pin internal opam deps (not published on opam-repository)
      run: |
        opam pin add -n -y mcp_protocol https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y mcp_protocol_eio https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y mcp_protocol_http https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y grpc-direct https://github.com/jeong-sik/grpc-direct.git#main
        opam pin add -n -y grpc-direct-core https://github.com/jeong-sik/grpc-direct.git#main
        opam pin add -n -y ocaml-webrtc https://github.com/jeong-sik/ocaml-webrtc.git#main

    - name: Install dependencies
      run: opam install . --deps-only --with-test -y

    - name: Run coverage
      run: opam exec -- make coverage
      continue-on-error: true

    - name: Extract coverage percentage
      id: cov
      run: |
        COV_PCT=$(opam exec -- make coverage-summary 2>&1 | grep -oP '[\d.]+(?=%)' | head -1 || echo "0")
        echo "coverage=$COV_PCT" >> "$GITHUB_OUTPUT"
        echo "## Coverage: ${COV_PCT}%" >> "$GITHUB_STEP_SUMMARY"

    - name: Coverage gate (60% warning)
      run: |
        COV="${{ steps.cov.outputs.coverage }}"
        if [ -z "$COV" ] || [ "$(echo "$COV < 60" | bc -l)" -eq 1 ]; then
          echo "::warning::Coverage ${COV}% is below 60% threshold"
        else
          echo "Coverage ${COV}% meets threshold"
        fi

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: _coverage/
        retention-days: 14

  benchmark:
    runs-on: ubuntu-latest
    needs: build
    # Best-effort only: avoid flaking PRs on transient opam download errors.
    if: github.event_name != 'pull_request'
    # Keep the CI signal green on main even if upstream opam downloads flake.
    continue-on-error: true
    timeout-minutes: 15
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up OCaml
      uses: ocaml/setup-ocaml@v3
      with:
        ocaml-compiler: '5.2'

    - name: Pin internal opam deps (not published on opam-repository)
      run: |
        opam pin add -n -y mcp_protocol https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y mcp_protocol_eio https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y mcp_protocol_http https://github.com/jeong-sik/mcp-protocol-sdk.git#main
        opam pin add -n -y grpc-direct https://github.com/jeong-sik/grpc-direct.git#main
        opam pin add -n -y grpc-direct-core https://github.com/jeong-sik/grpc-direct.git#main
        opam pin add -n -y ocaml-webrtc https://github.com/jeong-sik/ocaml-webrtc.git#main

    - name: Install dependencies
      run: opam install . --deps-only -y

    - name: Build benchmark
      run: opam exec -- dune build bench/bench_kirin.exe

    - name: Run benchmark
      run: opam exec -- dune exec bench/bench_kirin.exe -- --quick
      continue-on-error: true
